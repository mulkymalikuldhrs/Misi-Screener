<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiSi Terminal</title>
    <script src="https://unpkg.com/lightweight-charts/dist/lightweight-charts.standalone.production.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #1a1a1a;
            --border-color: #2c2c2c;
            --text-color: #f0f0f0;
            --text-muted: #888;
            --accent-color: #00bfa5;
            --accent-color-dark: #008c7a;
        }
        body {
            font-family: 'Source Code Pro', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            height: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .grid-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 8px 12px;
            background-color: var(--border-color);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-shrink: 0;
        }
        .panel-content {
            flex-grow: 1;
            padding: 12px;
            overflow-y: auto;
            position: relative;
        }
        .empty-panel-cta {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            color: var(--text-muted);
            cursor: pointer;
        }
        .empty-panel-cta kbd {
            background-color: var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 1.2em;
        }
        /* Command Palette */
        .command-palette-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none; /* Initially hidden */
            justify-content: center;
            align-items: flex-start;
            padding-top: 15vh;
            z-index: 1000;
        }
        .command-palette {
            width: 600px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }
        #cmd-input {
            width: 100%;
            padding: 16px;
            font-size: 1.2em;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
            box-sizing: border-box;
        }
        #cmd-input:focus { outline: none; }
        #cmd-results {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        #cmd-results li {
            padding: 12px 16px;
            cursor: pointer;
        }
        #cmd-results li:hover, #cmd-results li.selected {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }
        /* Table styles for FA app */
        .fa-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .fa-table th, .fa-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .fa-table th {
            font-weight: 600;
            color: var(--text-muted);
        }
        .fa-table td:nth-child(2) {
            text-align: right;
            font-weight: 500;
        }
        /* Styles for multi-asset results */
        .multi-asset-section {
            margin-bottom: 20px;
            padding-bottom: 10px;
            border-bottom: 1px solid var(--border-color);
        }
        .multi-asset-section:last-child {
            border-bottom: none;
        }
    </style>
</head>
<body>
    <div class="grid-container" id="grid-container">
        <!-- Panels will be dynamically inserted here -->
    </div>

    <div class="command-palette-overlay" id="command-palette-overlay">
        <div class="command-palette">
            <input type="text" id="cmd-input" placeholder="Enter command or AI query...">
            <ul id="cmd-results"></ul>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gridContainer = document.getElementById('grid-container');
            const commandPaletteOverlay = document.getElementById('command-palette-overlay');
            const cmdInput = document.getElementById('cmd-input');
            const cmdResults = document.getElementById('cmd-results');

            let activePanel = null;

            const APPS = [
                { command: '/news', description: 'Fetch news for a ticker', app_name: 'get_news_headlines' },
                { command: '/chart', description: 'Display historical price chart', app_name: 'get_historical_data' },
                { command: '/FA', description: 'Fetch Fundamental Analysis (Income Statement)', app_name: 'get_income_statement' },
            ];

            function renderPanels() {
                gridContainer.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    const panel = document.createElement('div');
                    panel.className = 'grid-panel';
                    panel.dataset.panelId = i;
                    panel.innerHTML = `
                        <div class="panel-content">
                            <div class="empty-panel-cta">
                                <p>Click or press <kbd>Ctrl+K</kbd> to start</p>
                            </div>
                        </div>
                    `;
                    panel.querySelector('.empty-panel-cta').addEventListener('click', () => openCommandPalette(panel));
                    gridContainer.appendChild(panel);
                }
            }

            function openCommandPalette(panel) {
                activePanel = panel;
                commandPaletteOverlay.style.display = 'flex';
                cmdInput.focus();
            }

            function closeCommandPalette() {
                commandPaletteOverlay.style.display = 'none';
                cmdInput.value = '';
                cmdResults.innerHTML = '';
                activePanel = null;
            }

            function updateCmdResults() {
                const query = cmdInput.value.toLowerCase();
                cmdResults.innerHTML = '';
                if (!query.startsWith('/')) {
                    cmdResults.innerHTML = `<li>Press Enter to send AI query: "<em>${query}</em>"</li>`;
                    return;
                }

                const filteredApps = APPS.filter(app => app.command.includes(query.split(' ')[0]));
                filteredApps.forEach(app => {
                    const li = document.createElement('li');
                    li.textContent = `${app.command} - ${app.description}`;
                    li.dataset.command = app.command;
                    li.dataset.appName = app.app_name;
                    li.addEventListener('click', () => executeCommand(li));
                    cmdResults.appendChild(li);
                });
            }

            async function executeCommand(selectedLi) {
                const isAiQuery = !selectedLi;
                const fullInput = cmdInput.value;

                if (!activePanel) return;

                let appName, endpoint, payload;

                if (isAiQuery) {
                    appName = "AI Query";
                    endpoint = '/api/v1/ai-query';
                    payload = { method: 'POST', headers: {'Content-Type': 'application/json'}, body: JSON.stringify({ query: fullInput }) };
                    activePanel.innerHTML = `<div class="panel-header"><span>AI Query: ${fullInput}</span><span>Loading...</span></div><div class="panel-content" id="panel-content-${activePanel.dataset.panelId}"></div>`;
                } else {
                    const command = selectedLi.dataset.command;
                    appName = selectedLi.dataset.appName;
                    const ticker = fullInput.split(' ')[1] ? fullInput.split(' ')[1].toUpperCase() : null;
                    if (!ticker) { alert("Please provide a ticker (e.g., /news AAPL)"); return; }
                    endpoint = `/api/v1/invoke/${appName}?ticker=${ticker}&q=${ticker}`;
                    payload = { method: 'GET' };
                    activePanel.innerHTML = `<div class="panel-header"><span>${command} ${ticker}</span><span>Loading...</span></div><div class="panel-content" id="panel-content-${activePanel.dataset.panelId}"></div>`;
                }

                closeCommandPalette();

                try {
                    const response = await fetch(endpoint, payload);
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(`API Error: ${errorData.detail || response.statusText}`);
                    }
                    const data = await response.json();
                    renderPanelContent(activePanel, data, isAiQuery ? 'ai_query' : appName);
                } catch (error) {
                    const contentDiv = activePanel.querySelector(`#panel-content-${activePanel.dataset.panelId}`);
                    contentDiv.innerHTML = `<p style="color: #ef5350;">Error: ${error.message}</p>`;
                }
            }

            function formatNumber(num) {
                if (num === 'None' || num === null) return 'N/A';
                const number = BigInt(num);
                if (number >= 1_000_000_000_000) return (Number(number) / 1_000_000_000_000).toFixed(2) + 'T';
                if (number >= 1_000_000_000) return (Number(number) / 1_000_000_000).toFixed(2) + 'B';
                if (number >= 1_000_000) return (Number(number) / 1_000_000).toFixed(2) + 'M';
                return Number(number).toLocaleString();
            }

            function renderPanelContent(panel, responseData, appIdentifier) {
                const contentDiv = panel.querySelector(`#panel-content-${panel.dataset.panelId}`);
                contentDiv.innerHTML = '';

                if (appIdentifier === 'ai_query') {
                    // Handle complex AI response
                    responseData.results.forEach(result => {
                        const section = document.createElement('div');
                        section.className = 'multi-asset-section';
                        section.innerHTML = `<h3>${result.ticker}</h3>`;

                        const dataNode = document.createElement('div');
                        renderSingleAsset(dataNode, result.data, responseData.app_name);
                        section.appendChild(dataNode);

                        contentDiv.appendChild(section);
                    });
                } else {
                    // Handle simple /invoke response
                    renderSingleAsset(contentDiv, responseData, appIdentifier);
                }
            }

            function renderSingleAsset(container, data, appName) {
                if (!data || Object.keys(data).length === 0 || (Array.isArray(data) && data.length === 0)) {
                    container.innerHTML = '<p>No data found. The API may have call frequency limits.</p>';
                    return;
                }

                if (appName === 'get_news_headlines') {
                    let html = '<ul>';
                    data.forEach(article => {
                        html += `<li><a href="${article.url}" target="_blank" rel="noopener noreferrer">${article.title}</a><p>${article.source.name}</p></li>`;
                    });
                    html += '</ul>';
                    container.innerHTML = html;
                } else if (appName === 'get_income_statement') {
                    const report = data.annualReports[0];
                    if (!report) { container.innerHTML = '<p>No annual report data found.</p>'; return; }
                    let html = `<h4>Income Statement (Annual)</h4><h5>${report.fiscalDateEnding}</h5><table class="fa-table">`;
                    const metrics = {'Total Revenue': report.totalRevenue, 'Gross Profit': report.grossProfit, 'Operating Income': report.operatingIncome, 'Net Income': report.netIncome, 'EBITDA': report.ebitda};
                    for (const [key, value] of Object.entries(metrics)) {
                        html += `<tr><td>${key}</td><td>${formatNumber(value)}</td></tr>`;
                    }
                    html += '</table>';
                    container.innerHTML = html;
                } else if (appName === 'get_historical_data') {
                    const chart = LightweightCharts.createChart(container, {
                        width: container.clientWidth, height: container.clientHeight,
                        layout: { backgroundColor: 'var(--panel-bg)', textColor: 'var(--text-color)' },
                        grid: { vertLines: { color: 'var(--border-color)' }, horzLines: { color: 'var(--border-color)' } },
                    });
                    const candleSeries = chart.addCandlestickSeries({ upColor: 'var(--accent-color)', downColor: '#ef5350', borderDownColor: '#ef5350', borderUpColor: 'var(--accent-color)', wickDownColor: '#ef5350', wickUpColor: 'var(--accent-color)' });
                    const formattedData = data.map(d => ({ time: new Date(d.Date).getTime() / 1000, open: d.Open, high: d.High, low: d.Low, close: d.Close }));
                    candleSeries.setData(formattedData);
                    chart.timeScale().fitContent();
                    new ResizeObserver(entries => {
                        if (entries.length === 0 || entries[0].target !== container) { return; }
                        const { width, height } = entries[0].contentRect;
                        chart.resize(width, height);
                    }).observe(container);
                }
            }

            window.addEventListener('keydown', (e) => {
                if (e.key === 'Enter' && commandPaletteOverlay.style.display === 'flex') {
                    const selected = cmdResults.querySelector('li');
                    executeCommand(selected);
                }
                if (e.ctrlKey && e.key === 'k') {
                    e.preventDefault();
                    if (commandPaletteOverlay.style.display === 'flex') closeCommandPalette();
                    else openCommandPalette(gridContainer.querySelector('.grid-panel')); // Open for first panel if none active
                }
                if (e.key === 'Escape' && commandPaletteOverlay.style.display === 'flex') {
                    closeCommandPalette();
                }
            });

            cmdInput.addEventListener('input', updateCmdResults);
            commandPaletteOverlay.addEventListener('click', (e) => {
                if (e.target === commandPaletteOverlay) closeCommandPalette();
            });

            renderPanels();
        });
    </script>
</body>
</html>

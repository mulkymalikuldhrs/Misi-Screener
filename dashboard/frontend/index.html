<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiSi Terminal</title>
    <link href="https://fonts.googleapis.com/css2?family=Source+Code+Pro:wght@400;500;600&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #0a0a0a;
            --panel-bg: #1a1a1a;
            --border-color: #2c2c2c;
            --text-color: #f0f0f0;
            --text-muted: #888;
            --accent-color: #00bfa5;
            --accent-color-dark: #008c7a;
        }
        body {
            font-family: 'Source Code Pro', monospace;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            height: 100vh;
            overflow: hidden;
        }
        .grid-container {
            display: grid;
            grid-template-columns: repeat(2, 1fr);
            grid-template-rows: repeat(2, 1fr);
            gap: 8px;
            height: 100%;
            padding: 8px;
            box-sizing: border-box;
        }
        .grid-panel {
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 4px;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }
        .panel-header {
            padding: 8px 12px;
            background-color: var(--border-color);
            font-weight: 600;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }
        .panel-content {
            flex-grow: 1;
            padding: 12px;
            overflow-y: auto;
        }
        .empty-panel-cta {
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100%;
            flex-direction: column;
            color: var(--text-muted);
        }
        .empty-panel-cta kbd {
            background-color: var(--border-color);
            padding: 4px 8px;
            border-radius: 4px;
            font-size: 1.2em;
        }
        /* Command Palette */
        .command-palette-overlay {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: rgba(0, 0, 0, 0.5);
            display: none; /* Initially hidden */
            justify-content: center;
            align-items: flex-start;
            padding-top: 15vh;
            z-index: 1000;
        }
        .command-palette {
            width: 600px;
            background-color: var(--panel-bg);
            border: 1px solid var(--border-color);
            border-radius: 8px;
            overflow: hidden;
        }
        #cmd-input {
            width: 100%;
            padding: 16px;
            font-size: 1.2em;
            background-color: transparent;
            border: none;
            border-bottom: 1px solid var(--border-color);
            color: var(--text-color);
            box-sizing: border-box;
        }
        #cmd-input:focus { outline: none; }
        #cmd-results {
            list-style: none;
            padding: 0;
            margin: 0;
            max-height: 400px;
            overflow-y: auto;
        }
        #cmd-results li {
            padding: 12px 16px;
            cursor: pointer;
        }
        #cmd-results li:hover, #cmd-results li.selected {
            background-color: var(--accent-color);
            color: var(--bg-color);
        }
        /* Table styles for FA app */
        .fa-table {
            width: 100%;
            border-collapse: collapse;
            font-size: 0.9em;
        }
        .fa-table th, .fa-table td {
            padding: 8px 12px;
            text-align: left;
            border-bottom: 1px solid var(--border-color);
        }
        .fa-table th {
            font-weight: 600;
            color: var(--text-muted);
        }
        .fa-table td:nth-child(2) {
            text-align: right;
            font-weight: 500;
        }
    </style>
</head>
<body>
    <div class="grid-container" id="grid-container">
        <!-- Panels will be dynamically inserted here -->
    </div>

    <div class="command-palette-overlay" id="command-palette-overlay">
        <div class="command-palette">
            <input type="text" id="cmd-input" placeholder="Enter command (e.g., /news AAPL)">
            <ul id="cmd-results"></ul>
        </div>
    </div>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const gridContainer = document.getElementById('grid-container');
            const commandPaletteOverlay = document.getElementById('command-palette-overlay');
            const cmdInput = document.getElementById('cmd-input');
            const cmdResults = document.getElementById('cmd-results');

            let activePanel = null; // To track which panel triggered the command palette

            // --- Available Applications ---
            const APPS = [
                { command: '/news', description: 'Fetch news for a ticker', app_name: 'get_news_headlines' },
                { command: '/chart', description: 'Display historical price chart', app_name: 'get_historical_data' },
                { command: '/FA', description: 'Fetch Fundamental Analysis (Income Statement)', app_name: 'get_income_statement' },
            ];

            // --- Panel Management ---
            function renderPanels() {
                gridContainer.innerHTML = '';
                for (let i = 0; i < 4; i++) {
                    const panel = document.createElement('div');
                    panel.className = 'grid-panel';
                    panel.dataset.panelId = i;
                    panel.innerHTML = `
                        <div class="panel-content">
                            <div class="empty-panel-cta">
                                <p>Press <kbd>Ctrl+K</kbd> to open command palette</p>
                            </div>
                        </div>
                    `;
                    panel.querySelector('.empty-panel-cta').addEventListener('click', () => {
                        openCommandPalette(panel);
                    });
                    gridContainer.appendChild(panel);
                }
            }

            // --- Command Palette Logic ---
            function openCommandPalette(panel) {
                activePanel = panel;
                commandPaletteOverlay.style.display = 'flex';
                cmdInput.focus();
            }

            function closeCommandPalette() {
                commandPaletteOverlay.style.display = 'none';
                cmdInput.value = '';
                cmdResults.innerHTML = '';
                activePanel = null;
            }

            function updateCmdResults() {
                const query = cmdInput.value.toLowerCase();
                cmdResults.innerHTML = '';
                if (!query.startsWith('/')) return;

                const filteredApps = APPS.filter(app => app.command.includes(query.split(' ')[0]));
                filteredApps.forEach(app => {
                    const li = document.createElement('li');
                    li.textContent = `${app.command} - ${app.description}`;
                    li.dataset.command = app.command;
                    li.dataset.appName = app.app_name;
                    li.addEventListener('click', () => executeCommand(li));
                    cmdResults.appendChild(li);
                });
            }

            async function executeCommand(selectedLi) {
                const command = selectedLi.dataset.command;
                const appName = selectedLi.dataset.appName;
                const fullInput = cmdInput.value.split(' ');
                const args = fullInput.slice(1);

                if (!activePanel) return;

                const ticker = args[0] ? args[0].toUpperCase() : null;
                if (!ticker) {
                    alert("Please provide a ticker (e.g., /news AAPL)");
                    return;
                }

                // Update panel header and show a loading state
                activePanel.innerHTML = `
                    <div class="panel-header">
                        <span>${command} ${ticker}</span>
                        <span>Loading...</span>
                    </div>
                    <div class="panel-content" id="panel-content-${activePanel.dataset.panelId}">
                        <!-- Content will be loaded here -->
                    </div>
                `;

                closeCommandPalette();

                try {
                    // This is where we fetch data from our new backend
                    const response = await fetch(`/api/v1/invoke/${appName}?ticker=${ticker}&q=${ticker}`);
                    if (!response.ok) {
                        const errorData = await response.json();
                        throw new Error(`API Error: ${errorData.detail || response.statusText}`);
                    }
                    const data = await response.json();

                    // Render the data into the panel
                    renderPanelContent(activePanel, data, appName);
                } catch (error) {
                    const contentDiv = activePanel.querySelector(`#panel-content-${activePanel.dataset.panelId}`);
                    contentDiv.innerHTML = `<p style="color: #ef5350;">Error: ${error.message}</p>`;
                }
            }

            function formatNumber(num) {
                if (num === 'None' || num === null) return 'N/A';
                const number = BigInt(num);
                if (number >= 1_000_000_000_000) {
                    return (Number(number) / 1_000_000_000_000).toFixed(2) + 'T';
                }
                if (number >= 1_000_000_000) {
                    return (Number(number) / 1_000_000_000).toFixed(2) + 'B';
                }
                if (number >= 1_000_000) {
                    return (Number(number) / 1_000_000).toFixed(2) + 'M';
                }
                return Number(number).toLocaleString();
            }

            function renderPanelContent(panel, data, appName) {
                const contentDiv = panel.querySelector(`#panel-content-${panel.dataset.panelId}`);
                if (!data || Object.keys(data).length === 0 || (Array.isArray(data) && data.length === 0)) {
                    contentDiv.innerHTML = '<p>No data found. The API may have call frequency limits.</p>';
                    return;
                }

                let html = '';
                if (appName === 'get_news_headlines') {
                    html = '<ul>';
                    data.forEach(article => {
                        html += `<li><a href="${article.url}" target="_blank">${article.title}</a><p>${article.source.name}</p></li>`;
                    });
                     html += '</ul>';
                } else if (appName === 'get_historical_data') {
                    html = '<ul>';
                     data.slice(0, 10).forEach(row => {
                        html += `<li>${new Date(row.Date).toLocaleDateString()}: Close $${row.Close.toFixed(2)}</li>`;
                    });
                    html += '</ul>';
                } else if (appName === 'get_income_statement') {
                    const report = data.annualReports[0];
                    if (!report) {
                        contentDiv.innerHTML = '<p>No annual report data found.</p>';
                        return;
                    }
                    html = `<h3>Income Statement (Annual)</h3><h4>${report.fiscalDateEnding}</h4><table class="fa-table">`;
                    const metrics = {
                        'Total Revenue': report.totalRevenue,
                        'Gross Profit': report.grossProfit,
                        'Operating Income': report.operatingIncome,
                        'Net Income': report.netIncome,
                        'EBITDA': report.ebitda,
                    };
                    for (const [key, value] of Object.entries(metrics)) {
                        html += `<tr><td>${key}</td><td>${formatNumber(value)}</td></tr>`;
                    }
                    html += '</table>';
                }
                contentDiv.innerHTML = html;
            }

            // --- Event Listeners ---
            window.addEventListener('keydown', (e) => {
                if (e.ctrlKey && e.key === 'k') {
                    e.preventDefault();
                    if (commandPaletteOverlay.style.display === 'flex') {
                        closeCommandPalette();
                    } else {
                        // If no panel is active, maybe open for the first one? For now, requires click.
                        console.log("Press Ctrl+K inside an empty panel or click on it.")
                    }
                }
                if (e.key === 'Escape' && commandPaletteOverlay.style.display === 'flex') {
                    closeCommandPalette();
                }
            });

            cmdInput.addEventListener('input', updateCmdResults);
            commandPaletteOverlay.addEventListener('click', (e) => {
                if (e.target === commandPaletteOverlay) {
                    closeCommandPalette();
                }
            });

            // --- Initialization ---
            renderPanels();
        });
    </script>
</body>
</html>

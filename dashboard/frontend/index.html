<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MiSi Screener - AI Trading Intelligence</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background-color: #121212; color: #e0e0e0; margin: 0; padding: 2rem; }
        .container { max-width: 900px; margin: auto; }
        h1 { color: #4CAF50; }
        #report-output { background-color: #1e1e1e; border: 1px solid #333; padding: 1rem; margin-top: 1rem; min-height: 400px; white-space: pre-wrap; }
        #chat-container { margin-top: 2rem; display: flex; }
        #chat-input { flex-grow: 1; padding: 0.8rem; background-color: #2c2c2c; border: 1px solid #444; color: #e0e0e0; }
        button { padding: 0.8rem 1.2rem; background-color: #4CAF50; border: none; color: white; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <h1>MiSi Screener - AI Trading Intelligence Engine</h1>
        <p>Welcome. Request a full institutional-grade analysis for any asset below.</p>

        <div id="report-output">
            <p>Analysis will appear here...</p>
        </div>

        <div id="chat-container">
            <input type="text" id="chat-input" placeholder="Type your query, e.g., 'Analyze BTC-USD HTF trend'">
            <button onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        function sendMessage() {
            const input = document.getElementById('chat-input');
            const output = document.getElementById('report-output');
            const userQuery = input.value;

            if (!userQuery) return;

            output.innerHTML = `<p><strong>User:</strong> ${userQuery}</p><p><strong>AI:</strong> Generating report... (This is a placeholder for the real API call)</p>`;

            // In the future, this will make a POST request to the /api/report endpoint.

            input.value = '';
        }
    </script>
</body>
</html>

# Strategy Definition for a Mean Reversion RSI Strategy

strategy_name: "MeanReversionRSI"
strategy_description: "A simple mean reversion strategy that buys when an asset is oversold and sells when overbought, based on the Relative Strength Index (RSI)."

# -- Asset & Timeframe --
# Defines which asset and timeframe this strategy applies to.
asset_ticker: "BTC-USD"
timeframe: "1h" # Timeframe for the OHLCV data (e.g., 1m, 5m, 1h, 1d)

# -- Strategy Parameters --
# Specific parameters for the RSI calculation and entry/exit signals.
parameters:
  rsi_period: 14
  oversold_threshold: 30
  overbought_threshold: 70

# -- Risk Management Parameters --
# Defines how risk is managed for each trade generated by this strategy.
risk_management:
  # The percentage of the total portfolio to risk on a single trade.
  risk_per_trade_percent: 1.0

  # How the stop loss is calculated.
  # Options: 'atr' (Average True Range), 'fixed_percent'
  stop_loss_method: "atr"
  stop_loss_atr_multiplier: 2.0 # e.g., Place stop loss 2x ATR below entry price

  # How the take profit is calculated.
  # Options: 'risk_reward_ratio'
  take_profit_method: "risk_reward_ratio"
  take_profit_ratio: 1.5 # e.g., Take profit at 1.5x the risk
